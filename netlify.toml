[build]
  command = "python3 tools/build_lessons_site.py"
  publish = "site"

[[redirects]]
  from = "/lessons/:lesson"
  to = "/lessons/:lesson.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/study/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
